<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>True wealth</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header Section -->
    <header class="header" id="header">
        <div class="header-container">
            <!-- Logo -->
            <div class="logo">
                <img class="logo" src="./assets/logo.png" alt="TORIN Wealth Management">
            </div>

            <!-- Navigation Menu -->
            <nav class="nav" id="nav-menu">
                <ul class="nav-list">
                    <li class="nav-item"><a href="#home" class="nav-link active">Home</a></li>
                    <li class="nav-item"><a href="#about" class="nav-link">About Us</a></li>
                    <li class="nav-item"><a href="#services" class="nav-link">Services</a></li>
                    <li class="nav-item"><a href="#feedback" class="nav-link">Feedback</a></li>
                    <li class="nav-item"><a href="#insights" class="nav-link">Insights</a></li>
                    <li class="nav-item"><a href="#contact" class="nav-link">Contact</a></li>
                </ul>
            </nav>

            <!-- Mobile Menu Toggle -->
            <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation">
                <span class="hamburger"></span>
                <span class="hamburger"></span>
                <span class="hamburger"></span>
            </button>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero" id="home">
        <div class="hero-overlay">
          <img src="assets/bg.jpg"/>
        </div>
        
        <div class="hero-content">
            <div class="hero-text">
                <h1 class="hero-title">
                    Redefining Financial Freedom for Over a Decade
                </h1>
                
                <p class="hero-description">
                    A leading wealth management firm delivering comprehensive financial solutions to individuals, families, and businesses across India.
                </p>

                <div class="hero-cta">
                    <a href="#contact" class="btn btn-primary">Get Started</a>
                    <a href="#about" class="btn btn-secondary">Learn More</a>
                </div>

    </section>

    <!-- Additional sections will go here -->
    
    <script src="script.js"></script>
</body>
</html>
